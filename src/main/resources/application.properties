spring.application.name=backend
jwt.secret=${JWT_SECRET:TeacherAI-Secure-Secret-Key-For-JWT-256Bits!!}
server.port=${PORT:8080}

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# Mail (Resend HTTP API — bypasses Railway SMTP port blocks entirely)
resend.api.key=${RESEND_API_KEY:}
app.mail.from=${MAIL_FROM:onboarding@smartboard.co.in}

# Admin setup (one-time secret to promote a user to ADMIN)
admin.setup.secret=${ADMIN_SETUP_SECRET:}

# Google OAuth
google.client.id=${GOOGLE_CLIENT_ID:}
