spring.application.name=backend
jwt.secret=${JWT_SECRET:TeacherAI-Secure-Secret-Key-For-JWT-256Bits!!}
server.port=${PORT:8080}

# ── Database (local H2 fallback) ──
spring.datasource.url=jdbc:h2:mem:teacherai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# Mail (Resend HTTP API — bypasses Railway SMTP port blocks entirely)
resend.api.key=${RESEND_API_KEY:}
app.mail.from=${MAIL_FROM:onboarding@smartboard.co.in}

# Admin setup (one-time secret to promote a user to ADMIN)
admin.setup.secret=${ADMIN_SETUP_SECRET:}

# Google OAuth
google.client.id=${GOOGLE_CLIENT_ID:}
