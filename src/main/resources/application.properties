spring.application.name=backend
jwt.secret=${JWT_SECRET:TeacherAI-Secure-Secret-Key-For-JWT-256Bits!!}
server.port=${PORT:8080}

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from=${MAIL_USERNAME:noreply@teachercopilot.co.in}

# Admin setup (one-time secret to promote a user to ADMIN)
admin.setup.secret=${ADMIN_SETUP_SECRET:}

# Google OAuth
google.client.id=${GOOGLE_CLIENT_ID:}
