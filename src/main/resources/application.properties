spring.application.name=backend
jwt.secret=${JWT_SECRET:TeacherAI-Secure-Secret-Key-For-JWT-256Bits!!}
server.port=${PORT:8080}

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# Mail (Resend SMTP relay — works on Railway, no port blocking)
spring.mail.host=smtp.resend.com
spring.mail.port=587
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_FROM:onboarding@smartboard.co.in}

# Admin setup (one-time secret to promote a user to ADMIN)
admin.setup.secret=${ADMIN_SETUP_SECRET:}

# Google OAuth
google.client.id=${GOOGLE_CLIENT_ID:}
