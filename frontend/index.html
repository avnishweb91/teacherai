<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>SmartBoard AI — AI Lesson Plans, Assessments & Report Cards for Indian Teachers</title>
    <meta name="description" content="SmartBoard AI helps Indian school teachers create lesson plans, question papers, report card remarks, attendance sheets and notices in seconds. Free for CBSE, ICSE & State Board teachers." />
    <meta name="keywords" content="AI lesson plan generator India, question paper generator CBSE, report card remarks generator, school teacher app India, AI for teachers, SmartBoard AI, assessment generator, attendance management school, notice generator school, timetable builder" />
    <meta name="author" content="SmartBoard AI" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.smartboard.co.in/" />

    <!-- Open Graph (WhatsApp, Facebook previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.smartboard.co.in/" />
    <meta property="og:title" content="SmartBoard AI — AI Teaching Assistant for Indian Schools" />
    <meta property="og:description" content="Create lesson plans, question papers, attendance sheets and report card remarks in seconds. Free for CBSE, ICSE & State Board teachers across India." />
    <meta property="og:image" content="https://www.smartboard.co.in/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="SmartBoard AI" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.smartboard.co.in/" />
    <meta name="twitter:title" content="SmartBoard AI — AI Teaching Assistant for Indian Schools" />
    <meta name="twitter:description" content="Create lesson plans, question papers and report card remarks in seconds. Free for Indian school teachers." />
    <meta name="twitter:image" content="https://www.smartboard.co.in/og-image.svg" />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SmartBoard AI",
      "applicationCategory": "EducationApplication",
      "operatingSystem": "Web",
      "url": "https://www.smartboard.co.in",
      "description": "AI-powered teaching assistant for Indian school teachers. Generate lesson plans, assessments, report cards, attendance sheets and notices instantly.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR",
        "description": "Free plan available. PRO at ₹199/month."
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "120"
      },
      "publisher": {
        "@type": "Organization",
        "name": "SmartBoard AI",
        "url": "https://www.smartboard.co.in",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "support@smartboard.co.in",
          "contactType": "customer support"
        }
      }
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is SmartBoard AI free for teachers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The FREE plan includes 3 lesson plans/day, 2 assessments/day, 2 notices/day and 1 report card/day. No credit card required."
          }
        },
        {
          "@type": "Question",
          "name": "Which boards does SmartBoard AI support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SmartBoard AI supports CBSE, ICSE, and all State Boards including Bihar Board. Content is generated in both Hindi and English."
          }
        },
        {
          "@type": "Question",
          "name": "Can my entire school use SmartBoard AI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Schools can register for a 7-day free trial for up to 5 teachers. After the trial, upgrade to a school plan for unlimited teachers."
          }
        },
        {
          "@type": "Question",
          "name": "How much does SmartBoard AI PRO cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SmartBoard AI PRO costs ₹199/month and gives unlimited access to all features including lesson plans, assessments, report cards, timetable builder and doubt solver."
          }
        }
      ]
    }
    </script>

    <meta name="theme-color" content="#1e3a8a" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
